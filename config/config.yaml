# =============================================================================
# ControlNet Multi-Weather Image Restoration
# =============================================================================
# python main.py --config config/config.yaml
# --mode train|infer  --override key=value  (CLI overrides YAML)

# =============================================================================
# Project / Runtime
# =============================================================================
project:
  name: "controlnet_multi_weather"
  mode: "train"                       # "train" | "infer"
  output_dir: "./outputs"
  seed: 42
  device: "cuda"                      # "cuda" | "cpu"
  num_gpus: 1
  mixed_precision: "fp16"             # "no" | "fp16" | "bf16"
  enable_xformers: true
  gradient_checkpointing: true
  print_config_on_start: true

# =============================================================================
# Model
# =============================================================================
model:
  base_model_path: "sd-research/stable-diffusion-2-base"
  # null = random init via ControlNetModel.from_unet()
  controlnet_path: null
  controlnet_hint_type: "degraded"    # "degraded" | "canny" | ...
  # "zero_one": [0,1] inputs (e.g. canny maps); "minus_one_one": [-1,1] (VAE-style)
  controlnet_hint_range: "minus_one_one"
  image_channels: 3
  latent_channels: 4
  downsample_factor: 8

# =============================================================================
# Weather-Category Text Conditioning
# =============================================================================
weather_prompt:
  use_weather_prompt: false
  prompt_template: "a clean photo after removing {weather}, high quality, sharp"
  negative_prompt: "blurry, low quality, artifacts, noise, distorted"
  weather_tokens:
    rain: "rain"
    snow: "snow"
    haze: "haze"
  cfg_dropout_prob: 0.1
  empty_prompt: ""

# =============================================================================
# Dataset
# =============================================================================
# Expected layout:
#   <data_root>/<weather>/<split>/{LQ,GT}/  (e.g. rain/train/LQ/, snow/test/GT/)
dataset:
  data_root: 'D:\Projects\pycharm\WeaFU-main\dataprocess'
  train_subdir: "train"
  test_subdir:  "test"
  lq_subdir:    "LQ"
  gt_subdir:    "GT"
  image_extensions: [".png", ".jpg", ".jpeg", ".bmp", ".webp"]
  image_size: 128                   # short side; H/W rounded to nearest %8
  random_flip: true
  random_crop: true
  normalize_range: "minus_one_one"
  num_workers: 8
  test_max_samples: 16
  samples_per_weather: 8          # per-class cap; null = no limit

# =============================================================================
# Training
# =============================================================================
train:
  # --- Schedule ---
  num_train_epochs: 20
  max_train_steps: null              # overrides num_train_epochs if set
  batch_size: 4
  gradient_accumulation_steps: 1
  # --- Optimiser ---
  learning_rate: 1.0e-5
  lr_scheduler: "constant"           # "constant" | "linear" | "cosine" | "cosine_with_restarts"
  lr_warmup_steps: 500
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_weight_decay: 1.0e-2
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  # --- Diffusion ---
  prediction_type: "epsilon"         # "epsilon" | "v_prediction"
  noise_offset: 0.0
  # --- Checkpointing ---
  validation_steps: 5000
  checkpointing_steps: 5000
  checkpointing_epochs: 1            # null = disabled
  checkpoints_total_limit: 3
  resume_from_checkpoint: null       # path or "latest"
  # --- Best-model tracking ---
  # metrics: "epoch_loss" | "epoch_loss_l1" | "val_psnr" | "val_ssim"
  save_best: true
  best_metric: "val_psnr"
  best_metric_mode: "max"
  # --- Image-quality metrics (PSNR / SSIM) ---
  image_quality:
    data_range: 1.0                  # SD2 output in [-1,1] → data_range=1.0
    backend: "torchmetrics"          # "torchmetrics" | "pure-torch"
  # --- Validation / Preview ---
  num_preview_images: 2              # saved at every checkpoint
  preview_image_size: 512            # upscale short side before validation inference
  num_validation_images: 2
  guidance_scale: 2.5
  num_inference_steps: 5
  # --- Logging ---
  log_every_n_steps: 20
  report_to: "tensorboard"           # "tensorboard" | "wandb" | "none"
  tracker_project_name: "controlnet-multi-weather"
  dataloader_pin_memory: true
  show_progress_bar: true

# =============================================================================
# Inference (python main.py --mode infer)
# =============================================================================
infer:
  # --- Checkpoint ---
  ckpt_path: "./outputs/controlnet_multi_weather/best"
  # --- I/O ---
  output_to_original_size: true      # resize prediction back to input resolution
  input_dir: null
  output_dir: null
  weather_from_subdir: false
  weather: "rain"
  num_test_images: null              # null = process all
  # --- Sampling ---
  guidance_scale: 2.5
  num_inference_steps: 30
  image_size: 512                    # short side upscale before inference
  # --- Tiled / variable-resolution inference (0 = disabled) ---
  tile_size: 0
  tile_stride: 0
  tile_blend_sigma: 0.0