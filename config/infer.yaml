# =============================================================================
# Inference-only config
# python main.py --config config/infer.yaml
# =============================================================================

project:
  name: "controlnet_multi_weather"
  mode: "infer"
  output_dir: "./outputs"
  seed: 42
  device: "cuda"
  num_gpus: 1
  mixed_precision: "fp16"
  enable_xformers: true
  gradient_checkpointing: false
  print_config_on_start: true

model:
  base_model_path: "sd-research/stable-diffusion-2-base"
  controlnet_path: null
  controlnet_hint_range: "minus_one_one"

weather_prompt:
  use_weather_prompt: false
  prompt_template: "a clean photo after removing {weather}, high quality, sharp"
  negative_prompt: "blurry, low quality, artifacts, noise, distorted"
  weather_tokens:
    rain: "rain"
    snow: "snow"
    haze: "haze"
  cfg_dropout_prob: 0.1
  empty_prompt: ""

dataset:
  test_subdir: "test"
  lq_subdir: "LQ"
  gt_subdir: "GT"

infer:
  ckpt_path: "./outputs/controlnet_multi_weather/checkpoint-700"
  input_dir: 'D:\Projects\pycharm\WeaFU-main\dataprocess\snow'
  output_dir: "./outputs/test"
  weather: "rain"
  weather_from_subdir: false
  num_test_images: 3                 # null = process all
  output_to_original_size: true
  guidance_scale: 2.5
  num_inference_steps: 20
  image_size: 512                    # short side upscale before inference
  tile_size: 512
  tile_stride: 384
  tile_blend_sigma: 32.0