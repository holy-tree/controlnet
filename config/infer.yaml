project:
  name: "controlnet_multi_weather"
  mode: "infer"                      # 必须为 "infer"
  output_dir: "./outputs"
  seed: 42
  device: "cuda"                     # "cuda" | "cpu"
  num_gpus: 1                        # 仅日志展示
  mixed_precision: "fp16"            # "no" | "fp16" | "bf16"
  enable_xformers: true
  gradient_checkpointing: false      # 推理阶段无需 gradient checkpointing
  print_config_on_start: true

# -----------------------------------------------------------------------------
# Model / 模型路径
# -----------------------------------------------------------------------------
model:
  # SD2 base 模型路径:本地路径或 HuggingFace repo id
  base_model_path: "sd-research/stable-diffusion-2-base"
  # 仅在 infer.ckpt_path 未设置时,这里作为 fallback 使用,通常无需填
  controlnet_path: null

# -----------------------------------------------------------------------------
# Weather prompt / 天气类别文本条件(可选,影响最终生成风格)
# -----------------------------------------------------------------------------
weather_prompt:
  # 设为 true 后,会在 prompt 前拼接天气专用短语
  use_weather_prompt: false
  prompt_template: "a clean photo after removing {weather}, high quality, sharp"
  negative_prompt: "blurry, low quality, artifacts, noise, distorted"
  # 数据集目录名 -> 自然语言 token 的映射
  weather_tokens:
    rain: "rain"
    snow: "snow"
    haze: "haze"
  cfg_dropout_prob: 0.1
  empty_prompt: ""

# -----------------------------------------------------------------------------
# Dataset / 子目录名约定 + image_size fallback
# -----------------------------------------------------------------------------
# 子目录名(test/lq/gt)必须与训练时 dataset.* 一致,代码据此自动定位:
#   <input_dir>/<test_subdir>/<lq_subdir>  -> 退化输入
#   <input_dir>/<test_subdir>/<gt_subdir>  -> 真值参考
# image_size 是分辨率的兜底(若 infer.image_size 没设)。
dataset:
  image_size: 256
  test_subdir: "test"
  lq_subdir: "LQ"
  gt_subdir: "GT"

# -----------------------------------------------------------------------------
# Train / 仅保留两个 fallback 字段
# -----------------------------------------------------------------------------
# 仅在 infer.* 同名字段未设置时作为 fallback,通常无需修改。
train:
  guidance_scale: 2.5                # 复原任务一般 2~3,远低于 SD 默认 7.5
  num_inference_steps: 20            # 推理步数,30 是质量/速度的常见平衡

# -----------------------------------------------------------------------------
# Infer / 推理核心配置
# -----------------------------------------------------------------------------
# 整体流程:
#   1. 从 <input_dir>/test/LQ 读退化图,自动配对 <input_dir>/test/GT 真值
#   2. 取前 num_test_images 张(按文件名排序)
#   3. 对每张跑模型得到复原图
#   4. 在 <output_dir>/test/<时间戳>/ 单目录下并列写出 LQ_<name> / GT_<name> / PRED_<name>
#
# 时间戳目录让每次测试独立保存,便于对比不同 checkpoint / 参数。
# 用前缀而非子目录,方便一次性按文件名 glob 排序。
infer:
  # ControlNet 权重目录路径(指向 checkpoint *目录*,不是单个文件)。
  # 一个 checkpoint 目录里通常包含:
  #   diffusion_pytorch_model.safetensors   真正的权重
  #   config.json                           模型结构配置
  #   optimizer.pt / scheduler.pt           训练状态(仅训练 ckpt 有)
  #
  # 推荐路径:
  #   ./outputs/<name>/best                 持续被最优模型覆盖
  #   ./outputs/<name>/checkpoint-<step>    按步存的快照
  #   ./outputs/<name>/checkpoint-epoch-<N> 按 epoch 存的快照
  ckpt_path: "./outputs/controlnet_multi_weather/checkpoint-700"

  # 测试源目录:指向 dataset 的某个 weather 子目录(包含 train/ 和 test/)
  # 例如 dataprocess/rain、dataprocess/snow、dataprocess/haze
  # 代码会自动拼成 <input_dir>/<test_subdir>/<lq_subdir>
  input_dir: 'D:\Projects\pycharm\WeaFU-main\dataprocess\snow'
  # 输出根目录:每次测试会在此目录下创建 test/<时间戳>/ 子目录
  output_dir: "./outputs/test"

  # 天气标签:直接给本批测试图打的标签,送进 weather_prompt(若启用)
  weather: "rain"

  # 取前几张图(LQ 文件按文件名排序后的前 N 张)。
  # null / 0 / 负数 = 不截断,处理全部 test 集。
  num_test_images: 3

  # ------------------------------------------------------------------
  # 采样参数(覆盖 train.* 中的同名 fallback)
  # ------------------------------------------------------------------
  guidance_scale: 2.5
  num_inference_steps: 20
  # 推理分辨率:短边缩放到此尺寸,再中心裁成 image_size × image_size
  image_size: 512